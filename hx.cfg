Section: misc
Priority: optional
Standards-Version: 3.9.2

Package: my-dev-env
Version: 1.0
Architecture: all
Maintainer: Arash <you@example.com>
Depends: helix, git, tmux, curl, build-essential
Postinst: postinst
File: /usr/share/my-dev-env/helix/config.toml 
	[editor]
	completion-trigger-len = 1   # suggest after 1 char (default 2)
	idle-timeout = 50            # ms before completion popup appears
	true-color = true            # force truecolor if your terminal supports it

	[editor.lsp]
	display-messages = true
	display-inlay-hints = true   # rust-analyzer type/param hints
	snippets = true              # tab-expandable LSP snippets

	[editor.cursor-shape]
	insert = "bar"
	normal = "block"
	select = "underline"

	# ---------- debug submenu under <space>g ----------
	[keys.normal.space.g]
	g = "dap_launch"             # pick a launch template
	b = "dap_toggle_breakpoint"
	c = "dap_continue"
	p = "dap_pause"
	i = "dap_step_in"
	o = "dap_step_out"
	n = "dap_next"               # step over
	v = "dap_variables"
	t = "dap_terminate"
	e = "dap_edit_condition"     # conditional breakpoint
	l = "dap_edit_log"           # logpoint
	s = { f = "dap_switch_stack_frame", t = "dap_switch_thread" }
  
File: /usr/share/my-dev-env/helix/languages.toml
	# ---------- language servers ----------

	[language-server.rust-analyzer]
	command = "rust-analyzer"

	[language-server.rust-analyzer.config.check]
	command = "clippy"          # run clippy instead of cargo check

	[language-server.rust-analyzer.config.cargo]
	features = "all"

	[language-server.rust-analyzer.config.inlayHints.bindingModeHints]
	enable = true

	[language-server.pyright]
	command = "pyright-langserver"
	args = ["--stdio"]

	[language-server.ruff]
	command = "ruff"
	args = ["server"]           # built-in server (ruff >= 0.5.3); handles lint + format

	[language-server.clangd]
	command = "clangd"
	args = ["--clang-tidy", "--header-insertion=never", "--completion-style=detailed"]

	# ---------- language configs ----------

	[[language]]
	name = "rust"
	auto-format = true
	language-servers = ["rust-analyzer"]
	formatter = { command = "rustfmt", args = ["--edition", "2021"] }

	[[language]]
	name = "python"
	auto-format = true
	# pyright = types + completion, ruff = lint + formatting
	language-servers = ["pyright", "ruff"]

	[[language]]
	name = "c"
	auto-format = true
	language-servers = ["clangd"]
